{% extends 'portfolio/layout.html' %}
{% block content %}
<h2>{{ titulo }}</h2>
<div class="card">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="javascript:history.back()" class="btn btn-edit">Cancelar</a>
    </form>
</div>
{% endblock %}
