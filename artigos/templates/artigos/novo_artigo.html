{% extends 'portfolio/layout.html' %}
{% block content %}
<h2>Novo Artigo</h2>
<div class="card">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <p><label>Título</label><br>
        <input type="text" name="titulo" required style="width:100%; padding:8px; margin-top:4px; border-radius:4px; border:1px solid #334155; background:#0f172a; color:white;"></p>

        <p style="margin-top:12px;"><label>Conteúdo</label><br>
        <textarea name="conteudo" rows="6" required style="width:100%; padding:8px; margin-top:4px; border-radius:4px; border:1px solid #334155; background:#0f172a; color:white;"></textarea></p>

        <p style="margin-top:12px;"><label>Imagem (opcional)</label><br>
        <input type="file" name="imagem" style="margin-top:4px; color:#94a3b8;"></p>

        <p style="margin-top:12px;"><label>Link externo (opcional)</label><br>
        <input type="url" name="link_externo" style="width:100%; padding:8px; margin-top:4px; border-radius:4px; border:1px solid #334155; background:#0f172a; color:white;"></p>

        <button type="submit" class="btn btn-primary" style="margin-top:16px;">Publicar</button>
        <a href="{% url 'artigos:lista' %}" class="btn btn-edit">Cancelar</a>
    </form>
</div>
{% endblock %}
